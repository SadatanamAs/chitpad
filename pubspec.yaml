name: chitpad_app
description: "chitpad — multi-user notepad app"
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5
  riverpod_annotation: ^2.3.4

  # ── Navigation (GetX — routing ONLY) ─────────────────────
  # Rule: NEVER use GetX controllers, GetX state, or Get.find()
  # ONLY use: Get.toNamed(), Get.back(), Get.offAllNamed()
  get: ^4.6.6

  # ── Networking ────────────────────────────────────────────
  dio: ^5.4.3+1

  # ── Models / Serialization ────────────────────────────────
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # ── Local Storage ─────────────────────────────────────────
  flutter_secure_storage: ^9.2.2  # JWT tokens — never SharedPrefs for auth
  shared_preferences: ^2.3.1       # non-sensitive user preferences

  # ── Environment Variables ─────────────────────────────────
  envied: ^0.5.4+1

  # ── Functional Error Handling ─────────────────────────────
  fpdart: ^1.1.0  # Either<Failure, T> pattern — matches backend error model

  # ── Utilities ─────────────────────────────────────────────
  logger: ^2.3.0
  connectivity_plus: ^6.0.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  envied_generator: ^0.5.4+1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  # TODO: Add assets after design decisions:
  # assets:
  #   - assets/images/
  #   - assets/icons/
  #   - assets/animations/
  # fonts:
  #   - family: YourFont
  #     fonts:
  #       - asset: assets/fonts/YourFont-Regular.ttf
